<!DOCTYPE html>
<html>
    <head>
        <style>
            #Scene {
                font-family: "Courier New", Courier, monospace;
                
            }
        </style>
        <title>Monstersweeper</title>
    </head>
    <body id="Main">
        <p id="Scene"><b>Monstersweeper (v3.0a)</b></p>
        <p id="HUD">Press "`" to open the game menu.</p>
    </body>
    <script>
        let dev = 0, game_state = 1
        const setting_playerControls = ["a", "d", "s", "w", "o", "[", "k", "p"]
        const settings_gameBackgroundColors = ["#000000", "#606060"]
        const settings_gameColors = [null, "#ffffff", "#808080", "#ffffff"]

        changeColor(true, "Main", 0)
        changeColor(false, "Scene", 1)
        changeColor(true, "Scene", 1)
        changeColor(false, "HUD", 3)
        
        function playerKeyCheck(playerKeyCheck_key) {if (event.key == playerKeyCheck_key) {return true} else {return false}};
        function changeColor(changeColor_background, changeColor_v, changeColor_i) {
            if (changeColor_background) {
                document.getElementById(changeColor_v).style.backgroundColor = settings_gameBackgroundColors[changeColor_i];
            } else {
                document.getElementById(changeColor_v).style.color = settings_gameColors[changeColor_i]
            };
            console.log("changeColor_background: " + changeColor_background + ", changeColor_v: " + changeColor_v + ", changeColor_i: " + settings_gameColors[changeColor_i]);
        };

        window.addEventListener("keydown", function (event) {
            /*Toggle Dev*/ if (playerKeyCheck("=")) {
                if (dev) {dev = 0} else {dev = 1};
                console.log("dev" + ": " + dev)
            };
            //Finish this later!
            function changeGameState () {
                if (playerKeyCheck("`")) {
                    game_state = 0;
                    console.log("game_state: " + game_state);
                    
                    changeColor(false, "Scene", 2);
                };
            }
            if (game_state) {
                /*Pause Game*/ if (playerKeyCheck("`")) {
                    game_state = 0;
                    console.log("game_state: " + game_state);
                    
                    changeColor(false, "Scene", 2);
                };
            } else {
                /*Unpause Game*/ if (playerKeyCheck("`")) {
                    game_state = 1;
                    console.log("game_state: " + game_state);
                    
                    changeColor(false, "Scene", 1)
                };
            };
        });
    </script>
</html>
