<!DOCTYPE html>
<html>
    <head>
        <style>
            #Scene {
                font-family: "Courier New", Courier, monospace;
                
            }
        </style>
        <title>Monstersweeper</title>
    </head>
    <body id="Main">
        <p id="Scene"><b>Monstersweeper (v3.0a)</b></p>
        <p id="HUD">Press "`" to open the game menu.</p>
    </body>
    <script>
        let dev = 0, game_state = 1, menu_i = 0
        const setting_playerControls = ["a", "d", "s", "w", "o", "[", "k", "p"];
        const settings_gameBackgroundColors = ["#000000", "#606060", null, "#404040"];
        const settings_gameColors = [null, "#ffffff", "#808080", "#ffffff"];

        changeColor(true, "Main", 0);
        changeColor(false, "Scene", 1);
        changeColor(false, "HUD", 3);

        function programLog(programLog_name, programLog_v) {
            let ProgramLog = {}
            for (let i_programLog = 0; i_programLog < programLog_name.length; i_programLog++) {ProgramLog[programLog_name[i_programLog]] = programLog_v[i_programLog]};
            console.log(ProgramLog);
        };
        
        function playerKeyCheck(playerKeyCheck_key) {if (event.key == playerKeyCheck_key) {return true} else {return false}};
        function changeColor(changeColor_background, changeColor_v, changeColor_i) {
            if (changeColor_background) {
                document.getElementById(changeColor_v).style.backgroundColor = settings_gameBackgroundColors[changeColor_i];
                console.log("[V] Background Color: " + settings_gameBackgroundColors[changeColor_i])
            } else {
                document.getElementById(changeColor_v).style.color = settings_gameColors[changeColor_i]
                console.log("[V] Color: " + settings_gameColors[changeColor_i])
            };
            //console.log("changeColor_background: " + changeColor_background + ", changeColor_v: " + changeColor_v + ", changeColor_i: " + settings_gameColors[changeColor_i]);
            programLog(["changeColor_background", "changeColor_v", "changeColor_i"], [changeColor_background, changeColor_v, changeColor_i])
            //check which type of color!
        };

        function changeText(changeText_type, changeText_name, changeText_v) {
            if (changeText_type) {document.getElementById(changeText_name).innerHTML += changeText_v} else {document.getElementById(changeText_name).innerHTML = changeText_v};
            programLog(["changeText_type", "changeText_name", "changeText_v"], [changeText_type, changeText_name, changeText_v])
        };
        function gameMenuEmptyObject(gameMenuEmptyObject_id, gameMenuEmptyObject_name) {
            this.id = gameMenuEmptyObject_id;
            this.name = gameMenuEmptyObject_name;
            this.function = function() {}
        }
        function gameMenuRebindObject(gameMenuRebindObject_id, gameMenuRebindObject_name) {
            this.id = gameMenuRebindObject_id;
            this.name = gameMenuRebindObject_name;
            this.function = function() {rebind(this.id)}
        }
        const GameMenu = [
            new gameMenuEmptyObject(10, "New Game"),
                {id:110, name:"Chapter 1", function:function() {level(1)}},
            new gameMenuEmptyObject(20, "Settings"),
                new gameMenuEmptyObject(120, "Controls"),
                    //new gameMenuObjectKey(1120, "Move Left", "a"),
                    {id:1120, name:"Move Left", key:"a", function:function() {rebind(this.id)}},
                    {id:2120, name:"Move Right", key:"d", function:function() {rebind(this.id)}},
                    {id:3120, name:"Move Down", key:"s", function:function() {rebind(this.id)}},
                    {id:4120, name:"Move Up", key:"w", function:function() {rebind(this.id)}},
                    {id:5120, name:"Use Tool Left", key:"o", function:function() {rebind(this.id)}},
                    {id:6120, name:"Use Tool Right", key:"[", function:function() {rebind(this.id)}},
                    {id:7120, name:"Use Tool Down", key:"k", function:function() {rebind(this.id)}},
                    {id:8120, name:"Use Tool Up", key:"p", function:function() {rebind(this.id)}},
                {id:920, name:"Delete Settings Data", function:function() {localStorage.removeItem(Settings)}}
        ];
        console.log(GameMenu)
        function gameMenuIncrease(gameMenuIncrease_v) {return Math.pow(10, menu_i.toString().length) * gameMenuIncrease_v};
        function gameMenuDecrease() {return Math.pow(10, menu_i.toString().length - 1) * gameMenu_i.toString().charAt(0)};
        function gameMenuCheck(gameMenuCheck_v) {GameMenu.find(e => e.id === gameMenuCheck_v)}
        function changeGameMenu() {
            
        }
        function gameMenu(gameMenu_i) {
            if (gameMenu_i == -1) { 
                menu_i = 0;
            } else if (gameMenu_i == 0) { 
                menu_i -= gameMenuDecrease();
            } else {
                const i_gameMenu = gameMenuIncrease(gameMenu_i);
                if (gameMenuCheck(gameMenu_i + i_gameMenu)) {
                    gameMenu_i += i_gameMenu;
                    gameMenuId(gameMenu_i)
                };
            };
            console.log(Object.keys({menu_i})[0] + ": " + menu_i + ", " + Object.keys({gameMenu_i})[0] + ": " + gameMenu_i);
            if (!gameMenu_using) {drawGameMenu()};
        };
        function drawGameMenu() {
            const log_drawGameMenu = []
            changeText(0, "HUD", "")
            for (let i_drawGameMenu = 1; i_drawGameMenu <= 9; i_drawGameMenu++) {
                const drawGameMenu_v = menu_i + gameMenuIncrease(i_drawGameMenu)
                const v_drawGameMenu = gameMenuCheck(drawGameMenu_v);
                if (v_drawGameMenu) {changeText(1, "HUD", "[" + i_drawGameMenu + "] " + v_drawGameMenu.name)};
                if (v_drawGameMenu?.key) {changeText(1, "HUD", " - " + v_drawGameMenu.key)};
                changeText(1, "HUD", "<br>");
                log_drawGameMenu.push(drawGameMenu_v);
            };
            console.log("i_drawGameMenu: " + log_drawGameMenu)

            if (menu_i > 0 && !game_state) {changeText(1, "HUD", "<br>[0] Back")};
        };

        window.addEventListener("keydown", function (event) {
            /*Toggle Dev*/ if (playerKeyCheck("=")) {
                if (dev) {dev = 0} else {dev = 1};
                console.log("dev" + ": " + dev)
            };
            function changeGameState(changeGameState_v) {
                if (playerKeyCheck("`")) {
                    game_state = changeGameState_v;
                    console.log("game_state: " + game_state);
                    
                    changeColor(false, "Scene", 2 - game_state);
                };
            }
            if (game_state) {
                changeGameState(0)
            } else {
                changeGameState(1);
                
            };
        });
    </script>
</html>
